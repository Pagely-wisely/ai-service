name: Continuous Deployment

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 2. JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. .env 파일 생성
        run: |
          cat << EOF > .env
          ${{ secrets.PROD_ENV_FILE }}
          EOF

      - name: 4. Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 5. Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GPR_USER=${{ secrets.GPR_USER }}
            GPR_KEY=${{ secrets.GPR_KEY }}
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-service:latest

      - name: 6. SSH를 통해 배포 서버 접속 및 컨테이너 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.APP_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 서버 내부의 배포 디렉토리 이동 (없으면 생성)
            mkdir -p ~/app/ai
            cd ~/app/ai
            
            # 서버 호스트에 .env 파일 작성
            cat << 'EOF' > .env
            ${{ secrets.PROD_ENV_FILE }}
            EOF
            
            # 최신 Docker 이미지 다운로드
            docker pull ${{ secrets.DOCKER_USERNAME }}/ai-service:latest
            
            # 기존에 돌고 있는 컨테이너 중지 및 삭제
            docker stop ai || true
            docker rm ai || true
            
            # 불필요한 구버전 이미지 정리
            docker image prune -f
            
            # 새 컨테이너 실행 (--env-file 옵션으로 뭉텅이 .env 주입)
            docker run -d \
              --name ai \
              -p 19021:19021 \
              -e SPRING_PROFILES_ACTIVE=prod \
              --env-file .env \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/ai-service:latest