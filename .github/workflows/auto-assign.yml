name: Auto Assign Reviewers

on:
  pull_request:
    types: [ opened, ready_for_review ]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Auto Assign Action
        uses: kentaro-m/auto-assign-action@v1.2.5
        with:
          configuration-path: ".github/auto_assign.yml"