spring:
  application:
    name: ai-service

  docker:
    compose:
      enabled: false

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${AI_DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 19021

#eureka:
#  client:
#    service-url:
#      defaultZone: http://localhost:8000/eureka

management:
  tracing:
    export:
      enabled: false

  endpoints:
    web:
      exposure:
        include: health,info,flyway
