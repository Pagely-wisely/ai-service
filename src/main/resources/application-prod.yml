spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:host.docker.internal}:${DB_AI_PORT}/${AI_DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: ${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT}

server:
  port: 19021

management:
  tracing:
    export:
      enabled: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://host.docker.internal:8000/eureka/}